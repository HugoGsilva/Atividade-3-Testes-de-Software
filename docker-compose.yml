services:
  app:
    build: .
    container_name: atividade03-testes
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    # Em máquinas lentas, aumenta o tempo de graceful shutdown
    stop_grace_period: 60s
    restart: unless-stopped
    # Healthcheck redundante no compose (sobrescreve o do Dockerfile se necessário)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/livros', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 5
    # Evita consumir muita CPU/RAM em máquinas fracas
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
